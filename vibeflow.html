<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeFlow - 智能氛围音乐播放器</title>
<style>
/* ============================================================
   CSS Variables - 赛博朋克/蒸汽波暗色主题
   ============================================================ */
:root {
  --bg-deep: #06060f;
  --bg-card: rgba(16, 16, 40, 0.65);
  --text-primary: #e8e8f8;
  --text-secondary: #9898c0;
  --text-muted: #6868a0;
  --accent-purple: #a855f7;
  --accent-cyan: #06b6d4;
  --accent-pink: #ec4899;
  --accent-green: #10b981;
  --glass-border: rgba(255, 255, 255, 0.07);
  --glow-purple: 0 0 20px rgba(168, 85, 247, 0.35);
  --glow-cyan: 0 0 20px rgba(6, 182, 212, 0.35);
  --radius: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
  background-color: var(--bg-deep);
  background-image:
    linear-gradient(rgba(168,85,247,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,85,247,0.025) 1px, transparent 1px);
  background-size: 44px 44px;
  color: var(--text-primary);
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(168,85,247,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 60%, rgba(6,182,212,0.05) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 80%, rgba(236,72,153,0.04) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
  animation: bgShift 20s ease-in-out infinite;
}
@keyframes bgShift {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(1%, -1%); }
  66% { transform: translate(-1%, 1%); }
}

/* ===================== Layout ===================== */
#app { position: relative; display: flex; flex-direction: column; height: 100vh; z-index: 1; }

#danmaku-layer {
  position: absolute; top: 0; left: 0; right: 0; height: 160px;
  z-index: 10; pointer-events: none; overflow: hidden;
}
.danmaku-item {
  position: absolute; white-space: nowrap; font-weight: 700;
  text-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
  pointer-events: none; will-change: left;
}

#main-container {
  display: flex; flex: 1; height: 100%; gap: 16px; padding: 16px;
  position: relative; z-index: 1;
}

/* ===================== Chat Panel (Left 30%) ===================== */
#chat-panel {
  width: 30%; min-width: 300px; display: flex; flex-direction: column;
  background: var(--bg-card); backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  box-shadow: var(--glow-purple), inset 0 1px 0 rgba(255,255,255,0.03);
  overflow: hidden;
}
#chat-header {
  padding: 12px 18px; font-size: 14px; font-weight: 700;
  background: linear-gradient(135deg, rgba(168,85,247,0.2), rgba(6,182,212,0.1));
  border-bottom: 1px solid var(--glass-border);
  display: flex; justify-content: space-between; align-items: center;
}
#chat-header-title {
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
#ai-status {
  font-size: 10px; padding: 3px 8px; border-radius: 10px;
  background: rgba(255,255,255,0.06); color: var(--text-muted);
}
#ai-status.online { color: var(--accent-green); }
#chat-messages {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth;
}
#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-track { background: transparent; }
#chat-messages::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.3); border-radius: 4px; }

.chat-msg {
  max-width: 92%; padding: 10px 14px; border-radius: 12px;
  font-size: 13px; line-height: 1.5;
  animation: msgIn 0.3s ease-out;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.chat-msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, rgba(168,85,247,0.3), rgba(236,72,153,0.2));
  border: 1px solid rgba(168,85,247,0.25); color: var(--text-primary);
}
.chat-msg.agent {
  align-self: flex-start;
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  color: var(--text-secondary);
}
.chat-msg.agent .ai-badge {
  display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 6px;
  background: rgba(16,185,129,0.2); color: var(--accent-green); margin-bottom: 4px;
}
.chat-msg .song-rec, .chat-msg .search-result-item {
  display: block; margin-top: 6px; padding: 8px 12px;
  background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(168,85,247,0.2));
  border: 1px solid rgba(6,182,212,0.3); border-radius: 8px;
  font-weight: 600; color: var(--accent-cyan); cursor: pointer;
  transition: all 0.2s; font-size: 12px;
}
.chat-msg .song-rec:hover, .chat-msg .search-result-item:hover {
  box-shadow: 0 0 16px rgba(6,182,212,0.4); transform: scale(1.02);
}
.chat-msg .search-result-item.external { border-color: rgba(245,158,11,0.4); color: #f59e0b; }

#chat-input-area {
  display: flex; padding: 10px 14px; border-top: 1px solid var(--glass-border); gap: 8px;
}
#chat-input {
  flex: 1; padding: 10px 14px; background: rgba(255,255,255,0.04);
  border: 1px solid var(--glass-border); border-radius: 20px;
  color: var(--text-primary); font-size: 13px; outline: none; transition: border-color 0.2s;
}
#chat-input:focus { border-color: var(--accent-purple); }
#chat-input::placeholder { color: var(--text-muted); }
#chat-send {
  padding: 10px 18px;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
  color: #fff; border: none; border-radius: 20px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
#chat-send:hover { box-shadow: 0 0 20px rgba(168,85,247,0.5); transform: scale(1.03); }

/* ===================== Player Panel (Right 70%) ===================== */
#player-panel {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px;
  background: var(--bg-card); backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  box-shadow: var(--glow-cyan); padding: 20px 24px; position: relative;
}
#album-art {
  width: 150px; height: 150px; border-radius: 16px;
  box-shadow: 0 0 30px rgba(168,85,247,0.2), 0 0 60px rgba(6,182,212,0.1);
  border: 2px solid rgba(255,255,255,0.08);
}
#song-info { text-align: center; }
#song-name {
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
  -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 2px;
}
#song-tags { font-size: 11px; color: var(--text-muted); letter-spacing: 1px; }
#mode-indicator {
  font-size: 10px; padding: 3px 10px; border-radius: 10px;
  background: rgba(168,85,247,0.2); color: var(--accent-purple);
  border: 1px solid rgba(168,85,247,0.3);
}
#mode-indicator.external { background: rgba(245,158,11,0.2); color: #f59e0b; border-color: rgba(245,158,11,0.3); }

#visualizer {
  width: 100%; max-width: 560px; height: 130px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.3);
}
#controls { display: flex; align-items: center; gap: 16px; }
.ctrl-btn {
  width: 42px; height: 42px; border-radius: 50%;
  border: 1px solid var(--glass-border); background: rgba(255,255,255,0.04);
  color: var(--text-primary); font-size: 16px; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.ctrl-btn:hover { box-shadow: 0 0 18px rgba(168,85,247,0.45); border-color: rgba(168,85,247,0.4); }
.ctrl-btn.play-btn { width: 52px; height: 52px; font-size: 20px; background: linear-gradient(135deg, rgba(168,85,247,0.35), rgba(236,72,153,0.25)); }

#progress-container {
  display: flex; align-items: center; gap: 10px;
  width: 100%; max-width: 400px; font-size: 11px; color: var(--text-muted);
}
#progress-bar {
  flex: 1; height: 5px; background: rgba(255,255,255,0.08);
  border-radius: 3px; cursor: pointer; overflow: hidden;
}
#progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan), var(--accent-pink));
  border-radius: 3px; transition: width 0.3s linear;
}
#progress-bar:hover { height: 8px; }

#volume-container { display: flex; align-items: center; gap: 10px; font-size: 14px; }
#volume-slider {
  -webkit-appearance: none; width: 100px; height: 4px;
  background: rgba(255,255,255,0.1); border-radius: 2px; outline: none;
}
#volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent-purple); cursor: pointer; box-shadow: 0 0 10px rgba(168,85,247,0.6);
}

#song-pills {
  display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-width: 500px;
}
.song-pill {
  padding: 4px 10px; border-radius: 12px; border: 1px solid var(--glass-border);
  background: rgba(255,255,255,0.03); color: var(--text-secondary);
  font-size: 10px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.song-pill:hover { border-color: rgba(168,85,247,0.4); color: var(--text-primary); }
.song-pill.active { background: rgba(168,85,247,0.2); border-color: var(--accent-purple); color: var(--accent-purple); font-weight: 600; }

/* ===================== Loading indicator ===================== */
.typing-indicator {
  align-self: flex-start; display: flex; gap: 4px; padding: 8px 14px;
}
.typing-indicator span {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent-purple);
  animation: typing 1.4s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }

/* ===================== Responsive ===================== */
@media (max-width: 768px) {
  #main-container { flex-direction: column; gap: 10px; padding: 8px; }
  #chat-panel { width: 100%; min-width: 0; max-height: 40vh; order: 2; }
  #player-panel { order: 1; padding: 14px; }
  #album-art { width: 100px; height: 100px; }
  #visualizer { height: 90px; }
  #danmaku-layer { height: 90px; }
  .ctrl-btn { width: 34px; height: 34px; font-size: 14px; }
  .ctrl-btn.play-btn { width: 42px; height: 42px; font-size: 16px; }
}
</style>
</head>
<body>

<div id="app">
  <div id="danmaku-layer"></div>

  <div id="main-container">
    <!-- 左侧：AI Agent 聊天面板 -->
    <div id="chat-panel">
      <div id="chat-header">
        <span id="chat-header-title">🤖 VibeFlow Agent</span>
        <span id="ai-status">离线</span>
      </div>
      <div id="chat-messages">
        <div class="chat-msg agent">
          嗨！我是 VibeFlow 的 AI 音乐助手 🎵<br>
          <b>新功能：</b>已接入 DeepSeek V4 智能大脑 + 铜钟在线音乐搜索！<br>
          输入 <b>/apikey 你的Key</b> 激活 AI 模式<br>
          输入 <b>!search 歌名</b> 搜索在线歌曲<br>
          或者直接描述心情让我推荐~
        </div>
      </div>
      <div id="chat-input-area">
        <input id="chat-input" type="text" placeholder="描述心情，或输入命令..." maxlength="500">
        <button id="chat-send">发送</button>
      </div>
    </div>

    <!-- 右侧：播放器面板 -->
    <div id="player-panel">
      <canvas id="album-art" width="320" height="320"></canvas>
      <div id="song-info">
        <div id="song-name">选择一首歌曲</div>
        <div id="song-tags"></div>

      </div>

      <canvas id="visualizer" width="560" height="130"></canvas>

      <div id="song-pills"></div>

      <div id="controls">
        <button class="ctrl-btn" id="btn-prev" title="上一首">⏮</button>
        <button class="ctrl-btn play-btn" id="btn-play" title="播放">▶️</button>
        <button class="ctrl-btn" id="btn-next" title="下一首">⏭</button>
      </div>

      <div id="progress-container">
        <span id="progress-current">0:00</span>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <span id="progress-duration">3:00</span>
      </div>

      <div id="volume-container">
        <span>🔊</span>
        <input type="range" id="volume-slider" min="0" max="100" value="70">
      </div>
    </div>
  </div>
</div>

<!-- 外部音频播放元素（隐藏） -->
<audio id="external-audio" style="display:none"></audio>

<script>
/* ============================================================
   VibeFlow v2 — DeepSeek V4 AI Agent + 铜钟在线音乐
   ============================================================ */

// ===================== 音符频率表 =====================
const NOTE = {
  'C2':65.41,'Cs2':69.30,'D2':73.42,'Eb2':77.78,'E2':82.41,'F2':87.31,'Fs2':92.50,
  'G2':98.00,'Ab2':103.83,'A2':110.00,'Bb2':116.54,'B2':123.47,
  'C3':130.81,'Cs3':138.59,'D3':146.83,'Eb3':155.56,'E3':164.81,'F3':174.61,
  'Fs3':185.00,'G3':196.00,'Ab3':207.65,'A3':220.00,'Bb3':233.08,'B3':246.94,
  'C4':261.63,'Cs4':277.18,'D4':293.66,'Eb4':311.13,'E4':329.63,'F4':349.23,
  'Fs4':369.99,'G4':392.00,'Ab4':415.30,'A4':440.00,'Bb4':466.16,'B4':493.88,
  'C5':523.25,'D5':587.33,'E5':659.25,'F5':698.46,'G5':783.99,'A5':880.00,
  'B5':987.77,'C6':1046.50,
};

// ===================== 全局状态 =====================
let audioCtx = null, masterGain = null, analyser = null, reverbNode = null;
let currentSongIdx = 0, isPlaying = false, scheduler = null;
let songStartTime = 0, progressInterval = null, visAnimId = null;
let particles = [], noiseCache = {};
let danmakuTimer = null, danmakuTheme = 'default';
const SONG_DURATION = 180;

// DeepSeek / 外部播放状态
let deepseekApiKey = '';
let playbackMode = 'synth'; // 'synth' | 'external'
let externalAudioUrl = '';
let extAudioStartTime = 0;

// ===================== 音频引擎 =====================
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.75;
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  reverbNode = createReverb();
  reverbNode.output.connect(masterGain);
  masterGain.connect(analyser);
  analyser.connect(audioCtx.destination);
}

function createReverb() {
  const input = audioCtx.createGain();
  const dry = audioCtx.createGain(); dry.gain.value = 0.65;
  const output = audioCtx.createGain(); output.gain.value = 1.0;
  input.connect(dry); dry.connect(output);
  const delayTimes = [0.032, 0.048, 0.063, 0.079, 0.095];
  delayTimes.forEach((t, i) => {
    const delay = audioCtx.createDelay(0.2); delay.delayTime.value = t;
    const fbGain = audioCtx.createGain(); fbGain.gain.value = 0.12 - i * 0.018;
    const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 4000 - i * 350;
    input.connect(delay); delay.connect(fbGain); fbGain.connect(lp);
    lp.connect(delay); lp.connect(output);
  });
  return { input, dry, output };
}

function createNoiseBuffer(duration, type) {
  const sr = audioCtx.sampleRate;
  const len = Math.max(1, Math.floor(sr * duration));
  const buf = audioCtx.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  if (type === 'pink') {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i=0;i<len;i++) {
      const w = Math.random()*2-1;
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11; b6=w*0.115926;
    }
  } else if (type === 'brown') {
    let last=0;
    for (let i=0;i<len;i++) { const w=Math.random()*2-1; d[i]=(last+0.02*w)/1.02; last=d[i]; d[i]*=3.5; }
  } else { for (let i=0;i<len;i++) d[i]=Math.random()*2-1; }
  return buf;
}

function playNoise(buf, time, gainVal, duration, filterType, filterFreq) {
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(gainVal, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + duration);
  const chain = [g];
  if (filterType) { const f = audioCtx.createBiquadFilter(); f.type = filterType; f.frequency.value = filterFreq; chain.unshift(f); }
  chain[0].connect(chain[1] || g);
  (chain[1] || chain[0]).connect(reverbNode.input);
  src.connect(chain[0]); src.start(time); src.stop(time + duration);
}

function playTone(freq, time, duration, type, gainVal, filterType, filterFreq) {
  const osc = audioCtx.createOscillator(); osc.type = type;
  osc.frequency.setValueAtTime(freq, time);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(gainVal, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + duration);
  let lastNode = osc;
  if (filterType) { const f = audioCtx.createBiquadFilter(); f.type = filterType; f.frequency.value = filterFreq; lastNode.connect(f); lastNode = f; }
  lastNode.connect(g); g.connect(reverbNode.input);
  osc.start(time); osc.stop(time + duration);
}

function getNoiseCache(type, dur) {
  const key = type + '_' + dur;
  if (!noiseCache[key]) noiseCache[key] = createNoiseBuffer(dur, type);
  return noiseCache[key];
}

// ----- 鼓声音色 -----
function kick(time, vol) {
  vol = vol || 0.8;
  playTone(150, time, 0.03, 'sine', vol * 0.7);
  const osc = audioCtx.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(150, time);
  osc.frequency.exponentialRampToValueAtTime(35, time + 0.08);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
  osc.connect(g); g.connect(reverbNode.input);
  osc.start(time); osc.stop(time + 0.25);
}
function snare(time, vol) {
  vol = vol || 0.55;
  playNoise(getNoiseCache('white', 0.15), time, vol, 0.15, 'highpass', 1200);
  playTone(180, time, 0.06, 'triangle', vol * 0.4);
  playTone(330, time, 0.06, 'sine', vol * 0.2);
}
function hihat(time, vol) { vol = vol || 0.18; playNoise(getNoiseCache('white', 0.06), time, vol * 0.6, 0.06, 'highpass', 7000); }
function openHat(time, vol) { vol = vol || 0.15; playNoise(getNoiseCache('white', 0.15), time, vol, 0.15, 'highpass', 5000); }

// ===================== 步进音序器 =====================
class StepScheduler {
  constructor(ctx, bpm, totalSteps, stepsPerBeat) {
    this.ctx = ctx; this.bpm = bpm; this.totalSteps = totalSteps || 16;
    this.stepsPerBeat = stepsPerBeat || 4;
    this.stepDur = 60 / bpm / this.stepsPerBeat;
    this.currentStep = 0; this.nextTime = 0; this.timer = null; this.running = false; this.onStep = null;
  }
  start(onStep) {
    this.onStep = onStep; this.running = true;
    this.nextTime = this.ctx.currentTime + 0.05; this.currentStep = 0; this._tick();
  }
  _tick() {
    if (!this.running) return;
    while (this.nextTime < this.ctx.currentTime + 0.15) {
      this.onStep(this.currentStep, this.nextTime, this.totalSteps);
      this.currentStep = (this.currentStep + 1) % this.totalSteps;
      this.nextTime += this.stepDur;
    }
    this.timer = setTimeout(() => this._tick(), 25);
  }
  stop() { this.running = false; if (this.timer) { clearTimeout(this.timer); this.timer = null; } }
}

// ===================== 6 首合成歌曲 =====================
function createLofiStudy() {
  const bassNotes = [NOTE.C2, NOTE.E2, NOTE.A2, NOTE.G2];
  const melNotes = [NOTE.C4,NOTE.Eb4,NOTE.F4,NOTE.G4,NOTE.Bb4,NOTE.G4,NOTE.F4,NOTE.Eb4,NOTE.C4,NOTE.Eb4,NOTE.G4,NOTE.F4,NOTE.Eb4,NOTE.C4,NOTE.D4,NOTE.Eb4];
  const bufVinyl = getNoiseCache('pink', 0.5); let melIdx = 0;
  return function(step, time, total) {
    if (step === 0 || step === 8) kick(time, 0.65);

// ===================== 播放器控制 =====================
function getCurrentSong() { return SONGS[currentSongIdx]; }

function switchSong(idx) {
  const wasPlaying = isPlaying;
  stopPlayback();
  currentSongIdx = idx;
  playbackMode = 'synth';
  updateModeIndicator();
  updateAlbumArt(); updateSongInfo(); updateSongPills(); updateDanmakuTheme();
  if (wasPlaying) startPlayback();
}

function startPlayback() {
  if (playbackMode === 'external') { startExternalPlayback(); return; }
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  stopPlayback();
  const song = getCurrentSong();
  scheduler = new StepScheduler(audioCtx, song.bpm, song.steps, 4);
  scheduler.start(song.create());
  isPlaying = true; songStartTime = Date.now();
  updatePlayButton(); startProgress(); startDanmaku(); startVisualizer();
}

function stopPlayback() {
  if (scheduler) { scheduler.stop(); scheduler = null; }
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
  // 停止外部音频
  const extAudio = document.getElementById('external-audio');
  if (!extAudio.paused) { extAudio.pause(); extAudio.currentTime = 0; }
  isPlaying = false;
  updatePlayButton();
}

function togglePlay() {
  if (isPlaying) { stopPlayback(); stopDanmaku(); }
  else { startPlayback(); }
}

function nextSong() {
  if (playbackMode === 'external') { stopPlayback(); switchToSynthMode(); switchSong((currentSongIdx + 1) % SONGS.length); }
  else switchSong((currentSongIdx + 1) % SONGS.length);
}
function prevSong() {
  if (playbackMode === 'external') { stopPlayback(); switchToSynthMode(); switchSong((currentSongIdx - 1 + SONGS.length) % SONGS.length); }
  else switchSong((currentSongIdx - 1 + SONGS.length) % SONGS.length);
}

function setVolume(val) {
  const v = val / 100;
  if (masterGain) { masterGain.gain.cancelScheduledValues(audioCtx.currentTime); masterGain.gain.setValueAtTime(v, audioCtx.currentTime); }
  document.getElementById('external-audio').volume = v;
}

// ===================== 外部音频播放 =====================
function startExternalPlayback() {
  const audio = document.getElementById('external-audio');
  if (!externalAudioUrl) return;
  audio.src = externalAudioUrl;
  audio.play().then(() => {
    isPlaying = true; extAudioStartTime = Date.now();
    updatePlayButton(); startProgress(); startDanmaku(); startVisualizer();
  }).catch(e => {
    addAgentMessage('❌ 播放失败：' + e.message + '<br>可能是音频链接不支持跨域访问');
  });
}

function switchToSynthMode() {
  playbackMode = 'synth';
  externalAudioUrl = '';
  document.getElementById('external-audio').src = '';
  updateModeIndicator();
  updateAlbumArt(); updateSongInfo();
}

function switchToExternalMode(url, name, tags) {
  stopPlayback();
  playbackMode = 'external';
  externalAudioUrl = url;
  updateModeIndicator();
  // 更新显示
  document.getElementById('song-name').textContent = name || '在线歌曲';
  document.getElementById('song-tags').textContent = (tags || ['online']).map(t => '#' + t).join(' ');
  updateAlbumArt();
  startPlayback();
}

function updateModeIndicator() {
  const el = document.getElementById('mode-indicator');
  if (playbackMode === 'external') {
    el.textContent = '🌐 在线模式'; el.className = 'external';
  } else {
    el.textContent = '🎹 合成模式'; el.className = '';
  }
}

function updatePlayButton() {
  document.getElementById('btn-play').textContent = isPlaying ? '⏸️' : '▶️';
}

function startProgress() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (!isPlaying) return;
    if (playbackMode === 'external') {
      const audio = document.getElementById('external-audio');
      if (audio.duration && isFinite(audio.duration)) {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';
        const m = Math.floor(audio.currentTime / 60);
        const s = Math.floor(audio.currentTime % 60);
        document.getElementById('progress-current').textContent = m + ':' + String(s).padStart(2, '0');
        const dm = Math.floor(audio.duration / 60);
        const ds = Math.floor(audio.duration % 60);
        document.getElementById('progress-duration').textContent = dm + ':' + String(ds).padStart(2, '0');
      } else {
        const elapsed = (Date.now() - songStartTime) / 1000;
        document.getElementById('progress-current').textContent = Math.floor(elapsed / 60) + ':' + String(Math.floor(elapsed % 60)).padStart(2, '0');
        document.getElementById('progress-duration').textContent = '--:--';
      }
      return;
    }
    const elapsed = (Date.now() - songStartTime) / 1000;
    const pct = Math.min(100, (elapsed / SONG_DURATION) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60);
    document.getElementById('progress-current').textContent = mins + ':' + String(secs).padStart(2, '0');
    if (pct >= 100) nextSong();
  }, 250);
}

  let colors = getCurrentSong().colors;
  if (playbackMode === 'external') colors = ['#f59e0b', '#f97316', '#ef4444'];
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, colors[0]); grad.addColorStop(0.5, colors[1]); grad.addColorStop(1, colors[2]);
  ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
  ctx.globalAlpha = 0.3; ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(w * 0.3, h * 0.35, w * 0.25, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(w * 0.7, h * 0.6, w * 0.18, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.5; ctx.fillStyle = '#000000';
  ctx.beginPath(); ctx.arc(w * 0.55, h * 0.5, w * 0.22, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 0.2; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) { ctx.beginPath(); ctx.arc(w * 0.5, h * 0.5, w * (0.15 + i * 0.08), 0, Math.PI * 2); ctx.stroke(); }
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 20px Inter, system-ui, sans-serif'; ctx.textAlign = 'center';
  ctx.shadowColor = colors[0]; ctx.shadowBlur = 12;

function startVisualizer() { if (visAnimId) return; function draw() { visAnimId = requestAnimationFrame(draw); drawSpectrum(); } draw(); }

function drawSpectrum() {
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.25)'; ctx.fillRect(0, 0, w, h);
  if (!analyser) return;
  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);
  analyser.getByteFrequencyData(dataArray);
  const barCount = 64;
  const barWidth = (w / barCount) * 0.85;
  const gap = (w / barCount) * 0.15;
  let colors = getCurrentSong().colors;
  if (playbackMode === 'external') colors = ['#f59e0b','#f97316','#ef4444'];
  for (let i = 0; i < barCount; i++) {
    const startBin = Math.floor(i * bufferLength / barCount);
    const endBin = Math.floor((i + 1) * bufferLength / barCount);
    let sum = 0; for (let j = startBin; j < endBin; j++) sum += dataArray[j];
    const avg = sum / (endBin - startBin);
    const barHeight = (avg / 255) * h * 0.85;
    const t = i / barCount;
    const r = Math.floor(parseInt(colors[0].slice(1,3), 16) * (1-t) + parseInt(colors[1].slice(1,3), 16) * t);
    const g = Math.floor(parseInt(colors[0].slice(3,5), 16) * (1-t) + parseInt(colors[1].slice(3,5), 16) * t);
    const b = Math.floor(parseInt(colors[0].slice(5,7), 16) * (1-t) + parseInt(colors[1].slice(5,7), 16) * t);
    const x = i * (barWidth + gap), y = h - barHeight;
    ctx.shadowColor = `rgb(${r},${g},${b})`; ctx.shadowBlur = 8;
    const barGrad = ctx.createLinearGradient(x, y, x, h);
    barGrad.addColorStop(0, `rgba(${r},${g},${b},0.9)`); barGrad.addColorStop(1, `rgba(${r},${g},${b},0.2)`);
    ctx.fillStyle = barGrad; ctx.fillRect(x, y, barWidth, barHeight);
    ctx.fillStyle = `rgba(${r},${g},${b},1)`; ctx.fillRect(x, y, barWidth, 2);
    ctx.shadowBlur = 0;
  }
  // 粒子
  if (particles.length < 80) {
    const i = Math.floor(Math.random() * barCount);
    const startBin = Math.floor(i * bufferLength / barCount);
    let sum = 0; for (let j = startBin; j < Math.floor((i + 1) * bufferLength / barCount); j++) sum += dataArray[j];
    if (sum / (bufferLength / barCount) > 60) {
      const x = i * (barWidth + gap) + barWidth / 2;
      const y = h - (sum / (bufferLength / barCount) / 255) * h * 0.85;
      particles.push({ x, y, vx: (Math.random() - 0.5) * 1.2, vy: -Math.random() * 2 - 0.5,
        life: 1, decay: 0.008 + Math.random() * 0.02, size: 1.5 + Math.random() * 2.5,
        color: colors[Math.floor(Math.random() * colors.length)] });
    }
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

    if (progress >= 1) { el.remove(); return; }
    el.style.left = (startX + progress * (endX - startX)) + 'px';
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

// ==================== DeepSeek AI 集成 ====================
async function callDeepSeek(userMessage, conversationHistory) {
  const messages = [
    { role: 'system', content: `你是 VibeFlow 音乐播放器的 AI 助手。用户会描述他们的心情或场景，你需要：
1. 用温暖、共情的语气回复（1-2句话）
2. 理解用户的心情，从内置歌曲库中推荐最匹配的一首
3. 内置歌曲库：0=Lo-fi Study Beats(chill/lofi), 1=Deep Focus(focus), 2=Rainy Day Blues(rainy), 3=Party Energy(energetic), 4=Happy Vibes(happy), 5=Midnight Drive(chill/lofi)
4. 如果用户想搜索在线歌曲，告诉用户使用 !search 命令
5. 回复格式：先共情，然后给出推荐。推荐的歌曲信息放在最后一行，格式为 [RECOMMEND:歌曲索引数字]

注意：回复要简洁自然，像朋友聊天一样，不要过于正式。用中文回复。` },
    ...conversationHistory.slice(-6),
    { role: 'user', content: userMessage }
  ];

  const response = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + deepseekApiKey },
    body: JSON.stringify({ model: 'deepseek-chat', messages, temperature: 0.8, max_tokens: 400 })
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error('API 请求失败 (' + response.status + '): ' + err);
  }

  const data = await response.json();
  return data.choices[0].message.content;
}

// 解析 DeepSeek 回复中的歌曲推荐
function parseRecommendation(text) {
  const match = text.match(/\[RECOMMEND:(\d)\]/);
  if (match) {
    const idx = parseInt(match[1]);
    return { idx, cleanText: text.replace(/\[RECOMMEND:\d\]/, '').trim() };
  }
  return null;
}

// ==================== 铜钟在线搜索 ====================
async function searchTonzhon(keyword) {
  // 铜钟 API（尝试多个端点）
  const endpoints = [
    `https://music-api.tonzhon.com/search/m/${encodeURIComponent(keyword)}`,
    `https://tonzhon.com/api/search?keyword=${encodeURIComponent(keyword)}`,
  ];

  for (const url of endpoints) {
    try {
      const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!resp.ok) continue;
      const data = await resp.json();
      if (data && data.data && data.data.songs && data.data.songs.length > 0) {
        return data.data.songs.map(s => ({
          name: s.name || '未知歌曲',
          artist: (s.artists && s.artists[0] && s.artists[0].name) || (s.artist) || '未知艺术家',
          album: (s.album && s.album.name) || '',
          sourceUrl: s.sourceUrl || s.url || s.mp3Url || '',
          id: s.id || s.songId || ''
        }));
      }
    } catch (e) { continue; }
  }
  return [];
}

  if (isAI) div.innerHTML = '<span class="ai-badge">🤖 DeepSeek AI</span><br>' + text;
  else div.innerHTML = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function addUserMessage(text) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg user'; div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addTypingIndicator() {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div'); div.className = 'typing-indicator';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ==================== 命令处理 ====================
function isCommand(input) {
  return input.startsWith('/') || input.startsWith('!');
}

async function handleCommand(input) {
  const lower = input.toLowerCase();

  // /apikey 设置 DeepSeek API Key
  if (input.startsWith('/apikey')) {
    const key = input.replace(/^\/apikey\s*/, '').trim();
    if (key) {
      deepseekApiKey = key;
      localStorage.setItem('vibeflow_deepseek_key', key);
      updateAIStatus(true);
      addAgentMessage('✅ DeepSeek API Key 已保存！AI 智能对话模式已激活。<br>现在你可以直接和我聊天，我会用 AI 理解你的心情并推荐音乐~', true);
    } else {
      const saved = localStorage.getItem('vibeflow_deepseek_key') || '';
      addAgentMessage('当前 Key: ' + (saved ? saved.slice(0, 8) + '...' + saved.slice(-4) : '未设置') +
        '<br>输入 <b>/apikey 你的Key</b> 来设置');
    }
    return;
  }

  // !search 搜索铜钟在线歌曲
  if (input.startsWith('!search') || input.startsWith('!s ')) {
    const keyword = input.replace(/^!(search|s)\s*/, '').trim();
    if (!keyword) { addAgentMessage('用法：<b>!search 歌名</b>，例如 !search 晴天'); return; }
    addAgentMessage('🔍 正在搜索铜钟在线曲库：「' + keyword + '」...');
    addTypingIndicator();
    try {
      const results = await searchTonzhon(keyword);
      removeTypingIndicator();
      if (results.length === 0) {
        addAgentMessage('😔 未找到「' + keyword + '」的相关歌曲<br>试试其他关键词？或者检查铜钟服务是否可访问');
      } else {
        let html = '🎵 找到 <b>' + results.length + '</b> 首在线歌曲：<br>';
        results.slice(0, 5).forEach((s, i) => {
          html += '<span class="search-result-item external" data-url="' + (s.sourceUrl || '') + '" data-name="' + (s.name || '') + '">' +
            (i + 1) + '. <b>' + s.name + '</b> — ' + s.artist + '</span>';
        });
        const div = addAgentMessage(html);
        // 绑定点击事件
        div.querySelectorAll('.search-result-item').forEach(item => {
          item.addEventListener('click', function() {
            const url = this.dataset.url;
            const name = this.dataset.name;
            if (!url) { addAgentMessage('❌ 该歌曲没有可用的播放链接'); return; }
            switchToExternalMode(url, name, ['online']);
            if (!isPlaying) startPlayback();
            addAgentMessage('🎶 正在播放：<b>' + name + '</b>（铜钟在线源）');
          });
        });
      }
    } catch (e) {
      removeTypingIndicator();
      addAgentMessage('❌ 搜索出错：' + e.message + '<br>请确认铜钟服务可访问，或稍后重试');
    }
    return;
  }

  // /synth 切换回合成模式
  if (input.startsWith('/synth')) {
    switchToSynthMode(); switchSong(currentSongIdx);
    if (!isPlaying) startPlayback();
    addAgentMessage('🎹 已切换回合成音乐模式');
    return;
  }

  // /help
  if (input.startsWith('/help')) {
    addAgentMessage('<b>可用命令：</b><br>/apikey &lt;key&gt; — 设置 DeepSeek API Key<br>!search &lt;歌名&gt; — 搜索铜钟在线歌曲<br>/synth — 切换回合成音乐<br>/danmu &lt;内容&gt; — 发送弹幕<br><br>直接输入心情或场景即可获得 AI 推荐！');
    return;
  }

  // /danmu 弹幕
  if (input.startsWith('/danmu') || input.startsWith('/弹幕')) {
    const content = input.replace(/^\/(danmu|弹幕)\s*/, '');
    if (content) { spawnDanmaku(content, '#ff69b4'); addAgentMessage('✨ 弹幕已发送：「' + content + '」'); }
    else addAgentMessage('用法：<b>/danmu 你想说的话</b>');
    return;
  }

  // 未知命令
  addAgentMessage('未知命令。输入 <b>/help</b> 查看可用命令');
}

// ==================== 旧关键词匹配（AI 未激活时的回退） ====================
const AGENT_RULES = [
  { keywords:['专注','focus','学习','study','工作','work','集中','效率'], songIdx:1,
    responses:['我懂你，专注的状态最珍贵 ✨ 这就为你切换到深度专注模式。','工作需要好音乐，Deep Focus 帮你屏蔽外界干扰。','学习最佳搭档来了 🎧 专注力拉满。']},
  { keywords:['下雨','rain','雨','忧郁','安静','emo','难过','伤感'], songIdx:2,
    responses:['下雨天最适合静静待着 🌧️ 来一首 Rainy Day Blues。','隔着窗听雨声的安全感，用音乐还原了。','抱抱 🫂 这首雨天氛围音乐治愈你。']},
  { keywords:['派对','party','嗨','蹦迪','燃','炸','兴奋','energy'], songIdx:3,
    responses:['气氛组就位！🔥 128 BPM Party Energy 直接炸场！','今晚不嗨不归！贝斯和鼓组拉满！','燃起来了！⚡ 在家也能蹦迪！']},
  { keywords:['开心','happy','快乐','好心情','高兴','欢快'], songIdx:4,
    responses:['好心情配好音乐！🌈 Happy Vibes 帮你把快乐放大。','阳光感和节奏感都拉满！','快乐会传染！💖 来感受这波能量。']},
  { keywords:['放松','chill','休息','躺','懒','relax','放空'], songIdx:0,
    responses:['累了就歇会儿 🎵 lo-fi 节拍松弛感满分。','放空模式开启 ☁️ 温暖底噪像老唱片。']},
  { keywords:['夜晚','night','开车','兜风','drive','夜','晚'], songIdx:5,
    responses:['午夜兜风的氛围太绝了 🌙 像在霓虹隧道穿行。','夜晚属于音乐和公路 🚗 深沉律动带你入夜。']},
  { keywords:['推荐','来一首','放首歌','随便','来点'], songIdx:-1,
    responses:['选不出来？随机来一首！🎲','好嘞，给你挑一首~ 🎶']},
];

function fallbackKeywordMatch(input) {
  for (const rule of AGENT_RULES) {
    if (rule.keywords.some(kw => input.toLowerCase().includes(kw.toLowerCase()))) {
      const resp = rule.responses[Math.floor(Math.random() * rule.responses.length)];
      let songIdx = rule.songIdx;
      if (songIdx === -1) songIdx = Math.floor(Math.random() * SONGS.length);
      const song = SONGS[songIdx];
      return { resp, songIdx, song };
    }
  }
  return null;
}

// ==================== 核心聊天处理 ====================
async function processChatInput(text) {
  if (!text.trim()) return;
  const input = text.trim();

  // 处理命令
  if (isCommand(input)) { addUserMessage(input); await handleCommand(input); return; }

  addUserMessage(input);

  // 如果配置了 DeepSeek API Key，使用 AI
  if (deepseekApiKey) {
    addTypingIndicator();
    try {
      const reply = await callDeepSeek(input, conversationHistory);
      removeTypingIndicator();

      // 保存对话历史
      conversationHistory.push({ role: 'user', content: input });
      conversationHistory.push({ role: 'assistant', content: reply });
      if (conversationHistory.length > 12) conversationHistory = conversationHistory.slice(-12);

      // 解析推荐
      const rec = parseRecommendation(reply);
      if (rec && rec.idx >= 0 && rec.idx < SONGS.length) {
        const song = SONGS[rec.idx];
        const respHTML = rec.cleanText +
          '<br><span class="song-rec" data-song="' + rec.idx + '">🎵 ' + song.name + ' — ' + song.tags.map(t => '#' + t).join(' ') + '</span>';
        const div = addAgentMessage(respHTML, true);

        // 切换并播放
        switchToSynthMode(); switchSong(rec.idx);
        if (!isPlaying) startPlayback();

        // 绑定推荐点击
        const recEl = div.querySelector('.song-rec');
        if (recEl) recEl.addEventListener('click', function() {
          const idx = parseInt(this.dataset.song);
          switchToSynthMode(); switchSong(idx);
          if (!isPlaying) startPlayback();
        });
      } else {
        addAgentMessage(reply, true);
      }
    } catch (e) {
      removeTypingIndicator();
      console.error('DeepSeek API error:', e);
      addAgentMessage('❌ AI 请求失败：' + e.message + '<br>已回退到关键词匹配模式。<br>检查 API Key 是否正确（<b>/apikey</b>）');
      // 回退到关键词匹配
      const fallback = fallbackKeywordMatch(input);
      if (fallback) {
        const html = fallback.resp + '<br><span class="song-rec" data-song="' + fallback.songIdx + '">🎵 ' + fallback.song.name + ' — ' + fallback.song.tags.map(t => '#' + t).join(' ') + '</span>';
        const div = addAgentMessage(html);
        switchToSynthMode(); switchSong(fallback.songIdx);
        if (!isPlaying) startPlayback();
        const recEl = div.querySelector('.song-rec');
        if (recEl) recEl.addEventListener('click', function() {
          const idx = parseInt(this.dataset.song);
          switchToSynthMode(); switchSong(idx);
          if (!isPlaying) startPlayback();
        });
      }
    }
    return;
  }

  // 无 AI Key：关键词匹配
  const fallback = fallbackKeywordMatch(input);
  if (fallback) {
    const html = fallback.resp + '<br><span class="song-rec" data-song="' + fallback.songIdx + '">🎵 ' + fallback.song.name + ' — ' + fallback.song.tags.map(t => '#' + t).join(' ') + '</span>';
    const div = addAgentMessage(html);
    switchToSynthMode(); switchSong(fallback.songIdx);
    if (!isPlaying) startPlayback();
    const recEl = div.querySelector('.song-rec');
    if (recEl) recEl.addEventListener('click', function() {
      const idx = parseInt(this.dataset.song);
      switchToSynthMode(); switchSong(idx);
      if (!isPlaying) startPlayback();
    });
  } else {
    addAgentMessage(
      '嗯…我不太确定你的心情 😊<br>试试用「专注」「放松」「派对」「下雨」「开心」「夜晚」描述~<br>' +
      '或者输入 <b>/apikey 你的Key</b> 激活 AI 智能对话！<br>' +
      '输入 <b>!search 歌名</b> 搜索在线歌曲'
    );
  }
}

// ==================== AI 状态指示 ====================
function updateAIStatus(online) {
  const el = document.getElementById('ai-status');
  if (online) { el.textContent = '🤖 AI 在线'; el.className = 'online'; }
  else { el.textContent = '离线'; el.className = ''; }
}

// ==================== 事件绑定 ====================
document.getElementById('btn-play').addEventListener('click', togglePlay);
document.getElementById('btn-prev').addEventListener('click', prevSong);
document.getElementById('btn-next').addEventListener('click', nextSong);
document.getElementById('volume-slider').addEventListener('input', function() { setVolume(this.value); });
document.getElementById('chat-send').addEventListener('click', function() {
  const input = document.getElementById('chat-input');
  processChatInput(input.value); input.value = '';
});
document.getElementById('chat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { const input = document.getElementById('chat-input'); processChatInput(input.value); input.value = ''; }
});
document.getElementById('progress-bar').addEventListener('click', function(e) {
  if (!isPlaying) return;
  const rect = this.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  if (playbackMode === 'external') {
    const audio = document.getElementById('external-audio');
    if (audio.duration && isFinite(audio.duration)) audio.currentTime = pct * audio.duration;
  } else {
    songStartTime = Date.now() - pct * SONG_DURATION * 1000;
  }
});
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { e.preventDefault(); nextSong(); }
  if (e.code === 'ArrowLeft') { e.preventDefault(); prevSong(); }
});

// 外部音频事件
document.getElementById('external-audio').addEventListener('ended', function() {
  stopPlayback(); stopDanmaku();
  addAgentMessage('🎵 在线歌曲播放完毕。输入 <b>!search 歌名</b> 搜索更多，或点击合成歌曲继续~');
});

// ==================== 初始化 ====================
function init() {
  // 读取保存的 API Key
  const savedKey = localStorage.getItem('vibeflow_deepseek_key');
  if (savedKey) {
    deepseekApiKey = savedKey;
    updateAIStatus(true);
  }

  // 提示用户设置 API Key
  if (!deepseekApiKey) {

  }

  buildSongPills();
  updateAlbumArt();
  updateSongInfo();

  updateModeIndicator();

  setTimeout(() => spawnDanmaku('欢迎来到 VibeFlow 🎵', '#a855f7'), 500);
  setTimeout(() => spawnDanmaku('AI 智能推荐已就绪', '#06b6d4'), 1500);
  setTimeout(() => spawnDanmaku('试试 !search 搜索在线歌曲', '#10b981'), 2800);
}

init();
